<!DOCTYPE html>
<html lang="es" class="theme-ajolote">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Favoritos | EcoGuía SOS</title>
    <meta name="description" content="Tus eventos, lugares y actores favoritos en un solo lugar.">

    <!-- PWA -->
    <link rel="icon" href="../assets/img/logo-app.webp" type="image/webp">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#1a1a2e">

    <!-- CSS Modules -->
    <link rel="stylesheet" href="../assets/css/global.css">
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="../assets/css/interior-pages.css">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        /* Estilos tipo "Dashboard" Glassmorphism */
        body {
            background-color: #0b0f19;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(114, 176, 77, 0.15), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(91, 194, 247, 0.15), transparent 25%);
            background-attachment: fixed;
            color: #e2e8f0;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
        }

        .dashboard-container {
            max-width: 1200px;
            margin: -70px auto 0; /* Sube detrás de la navbar */
            padding: 140px 20px 40px;
        }

        /* Top Bar de navegación propia */
        .dash-topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 40px;
        }

        .btn-back-home {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            padding: 10px 20px;
            border-radius: 20px;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .btn-back-home:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.2);
            transform: translateX(-5px);
        }

        /* Cabecera del Dashboard */
        .dash-header {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 24px;
            padding: 30px;
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 40px;
            backdrop-filter: blur(20px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .dash-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--color-gaia), var(--color-eco));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            color: white;
            box-shadow: 0 0 20px rgba(114, 176, 77, 0.3);
        }

        .dash-info h1 {
            margin: 0 0 5px 0;
            font-size: 2rem;
            color: white;
        }

        .dash-info p {
            margin: 0;
            color: #94a3b8;
            font-size: 1rem;
        }

        /* Segmented Control (Tabs) tipo iOS */
        .segmented-control {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 5px;
            display: inline-flex;
            gap: 5px;
            margin-bottom: 40px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .segment-btn {
            background: transparent;
            border: none;
            color: #94a3b8;
            padding: 12px 30px;
            border-radius: 12px;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .segment-btn:hover {
            color: white;
        }

        .segment-btn.active {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        /* Contenido de Tabs */
        .tab-content {
            display: none;
            animation: fadeIn 0.4s ease forwards;
        }
        .tab-content.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 768px) {
            .dash-header {
                flex-direction: column;
                text-align: center;
            }
            .segmented-control {
                width: 100%;
                display: flex;
            }
            .segment-btn {
                flex: 1;
                justify-content: center;
                padding: 10px;
            }
            .segment-btn span {
                display: none; /* Ocultar texto en móviles, solo iconos */
            }
        }
    </style>
</head>

<body class="dark-theme">

    <!-- Navbar Minimalista (el sistema inyecta aquí) -->
    <nav class="navbar glass-effect" id="main-nav">
        <div class="nav-container">
            <a href="../index.html" class="nav-brand">
                <img src="../assets/img/logo-navbar.webp" alt="Logo EcoGuía SOS" class="nav-brand-logo">
                <h1>EcoGuía SOS</h1>
            </a>

            <button class="hamburger-menu" aria-label="Abrir menú">
                <i class="fa-solid fa-bars"></i>
            </button>

            <ul class="nav-menu" id="nav-menu-list">
                <li><a href="../index.html" class="nav-blue-btn">Inicio</a></li>
                <li><a href="../pages/nosotros.html" class="nav-purple-btn">Nosotros</a></li>
                <li><a href="../como-usar.html" class="nav-how-to-btn">Cómo usar</a></li>
                <li><a href="../auth.html?tab=signup" class="nav-btn-highlight" id="nav-auth-btn">Súmate</a></li>
                <li><a href="../auth.html?tab=login" class="nav-login-btn" id="nav-login-btn">Iniciar sesión</a></li>
            </ul>
        </div>
    </nav>

    <div class="dashboard-container">
        
        <!-- Botón Volver -->
        <div class="dash-topbar">
            <a href="../index.html" class="btn-back-home">
                <i class="fa-solid fa-arrow-left"></i> Explorar Catálogo
            </a>
        </div>

        <!-- Header Personal -->
        <header class="dash-header">
            <div class="dash-avatar">
                <i class="fa-solid fa-user-astronaut"></i>
            </div>
            <div class="dash-info">
                <h1>Tu Panel Personal</h1>
                <p>Aquí se guarda todo lo que te inspira a cambiar el mundo.</p>
            </div>
        </header>

        <!-- Controles -->
        <div style="text-align: center;">
            <div class="segmented-control">
                <button class="segment-btn active" data-tab="eventos">
                    <i class="fa-solid fa-calendar-check"></i> <span>Mis Eventos</span>
                </button>
                <button class="segment-btn" data-tab="lugares">
                    <i class="fa-solid fa-location-dot"></i> <span>Mis Lugares</span>
                </button>
                <button class="segment-btn" data-tab="actores">
                    <i class="fa-solid fa-users"></i> <span>Siguiendo</span>
                </button>
            </div>
        </div>

        <!-- Contenedores -->
        <div id="eventos-tab" class="tab-content active">
            <div class="card-grid-container" id="container-eventos">
                <div style="text-align:center; padding: 50px; width: 100%;">
                    <i class="fa-solid fa-circle-notch fa-spin fa-2x" style="color: #72B04D;"></i>
                </div>
            </div>
        </div>

        <div id="lugares-tab" class="tab-content">
            <div class="card-grid-container" id="container-lugares"></div>
        </div>

        <div id="actores-tab" class="tab-content">
            <div class="card-grid-container" id="container-actores"></div>
        </div>

    </div>

    <!-- JS Module -->
    <script type="module" src="../assets/js/pages/mis-favoritos.js"></script>
</body>
</html>

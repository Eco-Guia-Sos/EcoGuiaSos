<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cursos y Talleres | EcoGuía SOS</title>
    <meta name="description" content="Aprende sobre sustentabilidad con nuestros cursos y talleres ambientales.">

    <!-- PWA -->
    <link rel="icon" href="../assets/gif/EGSlg.webp" type="image/gif">
    <link rel="manifest" href="../manifest.json">
    <meta name="theme-color" content="#72B04D">

    <!-- CSS Global -->
    <link rel="stylesheet" href="../assets/css/global.css">

    <style>
        .interior-hero {
            padding: 120px 20px 40px 20px;
            text-align: center;
            background: linear-gradient(to bottom, rgba(74, 107, 89, 0.9), rgba(74, 107, 89, 0.5)), url('../assets/img/colibri.webp') center/cover no-repeat;
            color: white;
            min-height: 250px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .interior-hero h2 {
            font-size: 2.8rem;
            margin-bottom: 10px;
            color: var(--primary-color);
        }

        .category-badge {
            background-color: rgba(255, 255, 255, 0.2);
            padding: 5px 15px;
            border-radius: 50px;
            font-size: 0.9rem;
            display: inline-block;
            margin-bottom: 15px;
            backdrop-filter: blur(5px);
        }

        .content-section {
            padding: 40px 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .curso-card {
            display: flex;
            flex-direction: column;
            background: rgba(43, 44, 46, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: var(--radius-lg);
            overflow: hidden;
            transition: transform 0.3s ease;
        }

        .curso-card:hover {
            transform: translateY(-5px);
            background: rgba(43, 44, 46, 0.8);
            border-color: var(--primary-color);
        }

        .c-img {
            width: 100%;
            height: 180px;
            object-fit: cover;
        }

        .c-content {
            padding: 20px;
            color: white;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .c-content h3 {
            margin-top: 0;
            color: var(--primary-color);
            font-size: 1.3rem;
        }

        .c-info {
            font-size: 0.85rem;
            color: #ccc;
            margin-bottom: 10px;
            display: flex;
            gap: 15px;
        }

        .c-desc {
            font-size: 0.9rem;
            line-height: 1.4;
            margin-bottom: 15px;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .btn-inscripcion {
            margin-top: auto;
            background-color: var(--primary-color);
            color: var(--bg-dark);
            padding: 10px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            text-align: center;
            transition: all 0.3s ease;
        }

        .btn-inscripcion:hover {
            background-color: white;
        }

        .card-grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
        }

        .loader-text {
            color: white;
            text-align: center;
            width: 100%;
            padding: 40px;
        }
    </style>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

    <nav class="navbar glass-effect sticky-top">
        <div class="logo-container">
            <a href="../index.html" class="logo-circle">
                <img src="../assets/img/kpop.webp" alt="Logo de EcoGuía SOS" width="40" height="40"
                    style="border-radius:50%">
            </a>
            <h1>EcoGuía SOS</h1>
        </div>

        <div class="hamburger-menu">
            <i class="fa-solid fa-bars"></i>
        </div>

        <ul class="nav-menu" id="nav-menu-list">
            <li><a href="../index.html">Inicio</a></li>
            <li><a href="nosotros.html">Nosotros</a></li>
            <li><a href="#">Directorio</a></li>
            <li><a href="#">Blog</a></li>
            <li><a href="#" class="nav-btn-highlight">Súmate</a></li>
        </ul>
    </nav>

    <header class="interior-hero">
        <span class="category-badge">🐦 Nivel Colibrí (Superficial)</span>
        <h2>Cursos y Talleres</h2>
        <p>Capacítate y adquiere nuevas herramientas para cuidar el planeta.</p>
    </header>

    <main class="content-section">
        <div class="card-grid-container" id="cursos-container">
            <div class="loader-text">
                <i class="fa-solid fa-spinner fa-spin fa-2x"></i>
                <p>Buscando ofertas educativas...</p>
            </div>
        </div>
    </main>

    <footer>
        <div style="text-align: center; padding: 20px; color: #888;">
            <p>&copy; 2026 EcoGuía SOS. Todos los derechos reservados.</p>
        </div>
    </footer>

    <script>
        const hamburger = document.querySelector('.hamburger-menu');
        const navMenu = document.getElementById('nav-menu-list');
        if (hamburger && navMenu) {
            hamburger.addEventListener('click', () => {
                navMenu.style.display = navMenu.style.display === 'flex' ? 'none' : 'flex';
            });
        }

        const SHEET_ID = '1D1eDZ89Jd71SyHQNX2fns8CoQlcCUrqAMprwjaOisCs';
        const PESTANA_CURSOS = 'Cursos';
        const DATA_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${PESTANA_CURSOS}`;

        async function fetchCursos() {
            const container = document.getElementById('cursos-container');

            try {
                const req = await fetch(DATA_URL);
                const res = await req.text();
                const jsonStr = res.substring(res.indexOf("({") + 1, res.lastIndexOf("})") + 1);
                const data = JSON.parse(jsonStr);

                container.innerHTML = '';
                const rows = data.table.rows;

                if (!rows || rows.length === 0) {
                    container.innerHTML = `<p class="loader-text">Aún no hay cursos programados.</p>`;
                    return;
                }

                // A:Nombre, B:Organiza, C:Fecha, D:Modalidad, E:Descripción, F:Imagen, G:Link
                for (let i = 0; i < rows.length; i++) {
                    const row = rows[i];
                    if (!row || !row.c) continue;

                    const nombre = row.c[0] && row.c[0].v ? row.c[0].v : '';
                    if (!nombre) continue;

                    const organiza = row.c[1] && row.c[1].v ? row.c[1].v : 'EcoGuía SOS';
                    const fecha = row.c[2] ? (row.c[2].f || row.c[2].v) : 'Por definir';
                    const modalidad = row.c[3] && row.c[3].v ? row.c[3].v : 'Presencial';
                    const desc = row.c[4] && row.c[4].v ? row.c[4].v : '';
                    const img = row.c[5] && row.c[5].v ? row.c[5].v : '../assets/img/colibri.webp';
                    const link = row.c[6] && row.c[6].v ? row.c[6].v : '#';

                    const cardHtml = `
                        <article class="curso-card glass-effect fade-in">
                            <img src="${img}" alt="${nombre}" class="c-img" onerror="this.src='../assets/img/colibri.webp'">
                            <div class="c-content">
                                <h3>${nombre}</h3>
                                <div class="c-info">
                                    <span><i class="fa-solid fa-graduation-cap"></i> ${organiza}</span>
                                </div>
                                <div class="c-info">
                                    <span><i class="fa-regular fa-calendar"></i> ${fecha}</span>
                                    <span><i class="fa-solid fa-laptop-code"></i> ${modalidad}</span>
                                </div>
                                <p class="c-desc">${desc}</p>
                                <a href="${link}" class="btn-inscripcion" target="_blank">Inscribirse</a>
                            </div>
                        </article>
                    `;
                    container.innerHTML += cardHtml;
                }
            } catch (error) {
                console.error("Error:", error);
                container.innerHTML = `<p class="loader-text">Error al cargar cursos. Verifica la pestaña 'Cursos'.</p>`;
            }
        }
        document.addEventListener('DOMContentLoaded', fetchCursos);
    </script>
</body>

</html>

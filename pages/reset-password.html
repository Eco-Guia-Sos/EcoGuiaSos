<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Contraseña - EcoGuía SOS</title>
    
    <!-- CSS Modules -->
    <link rel="stylesheet" href="../assets/css/global.css">
    <link rel="stylesheet" href="../assets/css/auth.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="dark-theme">

    <div id="particles-js"></div>

    <div class="auth-wrapper">
        <header class="auth-header">
            <a href="../auth.html" class="back-link"><i class="fa-solid fa-arrow-left"></i> Volver al ingreso</a>
            <img src="../assets/img/logo-navbar.webp" alt="Logo EcoGuía SOS" class="auth-logo">
        </header>

        <main class="auth-container glass-effect">
            <!-- Paso 1: Solicitar correo -->
            <div id="step-request" class="auth-form active">
                <h2>Recuperar Contraseña</h2>
                <p>Ingresa tu correo electrónico y te enviaremos un enlace para restablecer tu contraseña.</p>
                
                <form id="form-reset-request">
                    <div class="input-group">
                        <label for="reset-email">Email</label>
                        <div class="input-wrapper">
                            <i class="fa-solid fa-envelope"></i>
                            <input type="email" id="reset-email" placeholder="tu@email.com" required>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary auth-btn shimmer-extra">Enviar enlace</button>
                </form>
            </div>

            <!-- Paso 2: Actualizar contraseña (se muestra si viene de un link de recuperación) -->
            <div id="step-update" class="auth-form">
                <h2>Nueva Contraseña</h2>
                <p>Ingresa tu nueva contraseña para recuperar el acceso.</p>
                
                <form id="form-new-password">
                    <div class="input-group">
                        <label for="new-password">Nueva Contraseña</label>
                        <div class="input-wrapper">
                            <i class="fa-solid fa-lock"></i>
                            <input type="password" id="new-password" placeholder="Mínimo 6 caracteres" required minlength="6">
                        </div>
                    </div>
                    <div class="input-group">
                        <label for="confirm-password">Confirmar Contraseña</label>
                        <div class="input-wrapper">
                            <i class="fa-solid fa-lock"></i>
                            <input type="password" id="confirm-password" placeholder="Repite la contraseña" required minlength="6">
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary auth-btn shimmer-extra">Actualizar contraseña</button>
                </form>
            </div>

            <!-- Mensaje de éxito -->
            <div id="step-success" class="auth-form">
                <div style="text-align: center; padding: 20px;">
                    <i class="fa-solid fa-circle-check" style="font-size: 3.5rem; color: #72B04D; margin-bottom: 20px;"></i>
                    <h2 id="success-title">¡Enviado!</h2>
                    <p id="success-msg">Revisa tu bandeja de entrada para continuar.</p>
                    <br>
                    <a href="../auth.html" class="btn btn-primary">Volver al ingreso</a>
                </div>
            </div>
        </main>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
    <script type="module" src="../assets/js/pages/reset-password.js"></script>
</body>
</html>

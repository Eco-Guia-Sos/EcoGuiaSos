<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoGuía SOS - Cerca de mí</title>
    
    <!-- MapLibre GL CSS -->
    <link href='https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css' rel='stylesheet' />
    <link rel="stylesheet" href="./assets/css/global.css">
    <link rel="stylesheet" href="./assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            background: var(--background-dark);
        }

        #map-container {
            width: 100%;
            height: 100vh;
            z-index: 1;
        }

        /* Float UI */
        .map-overlay {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            z-index: 3000 !important;
            display: flex;
            flex-direction: column;
            pointer-events: none;
        }

        .map-right-controls {
            position: absolute;
            top: 240px; /* Debajo de los controles de zoom de MapLibre */
            right: 20px;
            z-index: 3000;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .map-overlay > * {
            pointer-events: auto;
        }

        .search-bar {
            background: rgba(2, 6, 23, 0.8);
            -webkit-backdrop-filter: blur(20px);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            padding: 12px 25px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            gap: 12px;
            width: 380px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            transition: all 0.3s ease;
        }

        .search-bar:focus-within {
            border-color: var(--color-eco);
            box-shadow: 0 0 20px rgba(114, 176, 77, 0.3);
            width: 420px;
        }

        .territory-filters {
            display: flex;
            gap: 10px;
            pointer-events: auto;
        }

        .custom-select {
            background: rgba(2, 6, 23, 0.85);
            -webkit-backdrop-filter: blur(20px);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            padding: 10px 20px;
            border-radius: 50px;
            color: white;
            font-size: 0.9rem;
            font-weight: 600;
            outline: none;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            appearance: none;
            -webkit-appearance: none;
            min-width: 150px;
        }

        .custom-select:hover {
            border-color: rgba(255,255,255,0.3);
            background: rgba(15, 23, 42, 0.9);
        }

        .custom-select:focus {
            border-color: var(--color-eco);
            box-shadow: 0 0 15px rgba(114, 176, 77, 0.3);
        }

        .custom-select option {
            background: #0f172a;
            color: white;
        }

        .custom-select:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            filter: grayscale(1);
        }

        /* Carrusel Inferior de Eventos */
        .map-events-tray {
            position: absolute;
            bottom: 30px;
            left: 0;
            width: 100%;
            padding: 20px;
            z-index: 1000;
            display: flex;
            gap: 15px;
            overflow-x: auto;
            scroll-behavior: smooth;
            pointer-events: auto; /* Permitir capturar el arrastre */
            scrollbar-width: none;
            user-select: none; /* Evitar seleccionar texto al arrastrar */
            cursor: grab;
        }

        .map-events-tray:active {
            cursor: grabbing;
        }

        .map-events-tray::-webkit-scrollbar {
            display: none;
        }

        .map-events-tray > * {
            pointer-events: auto;
        }

        .map-event-card {
            min-width: 280px;
            max-width: 280px;
            background: rgba(2, 6, 23, 0.8);
            -webkit-backdrop-filter: blur(20px);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            display: flex;
            padding: 12px;
            gap: 12px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .map-event-card:hover {
            transform: translateY(-10px) scale(1.02);
            border-color: var(--color-eco);
            background: rgba(15, 23, 42, 0.95);
        }

        .map-event-card img {
            width: 80px;
            height: 80px;
            border-radius: 12px;
            object-fit: cover;
        }

        .map-event-info {
            flex: 1;
            overflow: hidden;
        }

        .map-event-info h4 {
            margin: 0;
            color: white;
            font-size: 0.95rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .map-event-info p {
            margin: 4px 0;
            color: rgba(255,255,255,0.6);
            font-size: 0.8rem;
        }

        .map-event-dist {
            color: var(--color-eco) !important;
            font-weight: 700;
            font-size: 0.75rem !important;
        }

        .search-bar input {
            background: transparent;
            border: none;
            color: #ffffff;
            flex: 1;
            outline: none;
            font-size: 1rem;
            font-weight: 500;
        }

        .map-btn {
            width: 55px;
            height: 55px;
            background: rgba(15, 23, 42, 0.85);
            -webkit-backdrop-filter: blur(15px);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 18px;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
        }

        .map-btn:hover {
            background: var(--color-eco);
            transform: translateY(-5px) scale(1.1);
            box-shadow: 0 15px 30px rgba(114, 176, 77, 0.4);
            border-color: rgba(255,255,255,0.4);
        }

        .map-btn.active {
            background: var(--color-eco);
            box-shadow: 0 0 20px var(--color-eco);
        }

        /* --- ATLAS HEADER (ESTILO PREMIUM) --- */
        .atlas-title {
            position: absolute;
            top: 25px;
            right: 30px;
            text-align: right;
            z-index: 1000;
            pointer-events: none;
            background: rgba(15, 23, 42, 0.65);
            backdrop-filter: blur(20px);
            padding: 15px 30px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 15px 40px rgba(0,0,0,0.5), 
                        inset 0 0 15px rgba(114, 176, 77, 0.1);
        }

        .atlas-title h1 {
            font-size: 2rem;
            font-weight: 900;
            margin: 0;
            background: linear-gradient(135deg, #ffffff 0%, #94a3b8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 5px; /* Espaciado elegante */
            text-transform: uppercase;
            line-height: 1;
        }

        .atlas-title p {
            margin: 8px 0 0 0;
            color: var(--color-eco);
            font-weight: 700;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            opacity: 0.9;
            text-shadow: 0 0 10px rgba(114, 176, 77, 0.3);
        }

        /* Empujar controles de zoom debajo del título */
        .maplibregl-ctrl-top-right {
            top: 130px !important;
            right: 20px !important;
        }

        #map-container {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 100%;
            background: #f8fafc; /* Fondo claro por si fallan las tiles */
        }

        /* --- DETALLE DE EVENTO (SIDE PANEL) --- */
        .map-side-panel {
            position: absolute;
            top: 95px; /* Justo debajo del buscador */
            left: 20px;
            width: 380px;
            background: rgba(15, 23, 42, 0.95); /* Más sólido para evitar transparencia excesiva */
            backdrop-filter: blur(20px);
            border-radius: 24px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.6);
            z-index: 1000;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.2);
            animation: slideInLeft 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* MapLibre Popup Styling */
        .maplibregl-popup-content {
            background: rgba(15, 25, 35, 0.95) !important;
            -webkit-backdrop-filter: blur(12px) !important;
            backdrop-filter: blur(12px) !important;
            color: white !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            border-radius: 16px !important;
            padding: 15px !important;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4) !important;
        }

        .maplibregl-popup-tip {
            border-top-color: rgba(15, 25, 35, 0.95) !important;
        }

        .popup-card {
            min-width: 180px;
        }

        .popup-card h3 {
            margin: 0 0 5px 0;
            font-size: 1.1rem;
            color: var(--color-eco);
        }

        .popup-card p {
            font-size: 0.85rem;
            margin: 0 0 12px 0;
            color: rgba(255,255,255,0.7);
        }

        .badge {
            padding: 4px 10px;
            border-radius: 8px;
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .popup-btn {
            background: var(--color-eco);
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 10px;
            font-size: 0.85rem;
            width: 100%;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        .popup-btn:hover {
            background: var(--color-eco-hover);
            transform: translateY(-2px);
        }

        /* === FILTER PANEL (DRAWER OVERLAY) === */
        .filter-panel {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2000;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .filter-panel.open {
            pointer-events: auto;
            opacity: 1;
        }

        .filter-panel-backdrop {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(2px);
        }

        .filter-panel-drawer {
            position: absolute;
            top: 90px;
            left: 20px;
            width: 320px;
            background: rgba(2, 6, 23, 0.92);
            backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 24px;
            padding: 24px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.8), 0 0 40px rgba(114,176,77,0.1);
            transform: translateY(-10px);
            transition: transform 0.3s ease;
        }

        .filter-panel.open .filter-panel-drawer {
            transform: translateY(0);
        }

        .filter-panel-title {
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 2px;
            color: rgba(255,255,255,0.4);
            text-transform: uppercase;
            margin: 0 0 12px 0;
        }

        .filter-section {
            margin-bottom: 20px;
        }

        .filter-section:last-child {
            margin-bottom: 0;
        }

        /* Region chips */
        .region-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .region-chip {
            padding: 7px 14px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.15);
            background: rgba(255,255,255,0.05);
            color: rgba(255,255,255,0.7);
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .region-chip:hover {
            border-color: rgba(114,176,77,0.5);
            color: #72b04d;
        }

        .region-chip.active {
            background: rgba(114,176,77,0.2);
            border-color: #72b04d;
            color: #72b04d;
            box-shadow: 0 0 12px rgba(114,176,77,0.3);
        }

        .filter-select {
            width: 100%;
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 12px;
            color: white;
            padding: 10px 14px;
            font-size: 0.85rem;
            font-weight: 600;
            outline: none;
            cursor: pointer;
            transition: all 0.2s ease;
            appearance: none;
            -webkit-appearance: none;
        }

        .filter-select:hover, .filter-select:focus {
            border-color: rgba(114,176,77,0.5);
        }

        .filter-select:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .filter-clear-btn {
            width: 100%;
            padding: 10px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            background: transparent;
            color: rgba(255,255,255,0.5);
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 4px;
        }

        .filter-clear-btn:hover {
            background: rgba(255,255,255,0.05);
            color: white;
        }

        /* === CAROUSEL ARROWS === */
        .carousel-wrapper {
            position: absolute;
            bottom: 22px;
            left: 0;
            width: 100%;
            z-index: 1001;
            display: flex;
            align-items: center;
            pointer-events: none;
        }

        .carousel-arrow {
            flex-shrink: 0;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(2, 6, 23, 0.85);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.15);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            pointer-events: auto;
            transition: all 0.2s ease;
            z-index: 1002;
            margin: 0 8px;
        }

        .carousel-arrow:hover {
            background: rgba(114,176,77,0.3);
            border-color: #72b04d;
            box-shadow: 0 0 15px rgba(114,176,77,0.4);
        }

        /* === CARD ACTIVE GLOW (EXTREME NEON) === */
        .map-event-card.card--active {
            border: 2px solid #72b04d !important;
            box-shadow: 0 0 30px #72b04d, 0 0 60px rgba(114, 176, 77, 0.5) !important;
            transform: translateY(-12px) scale(1.05) !important;
            background: rgba(114, 176, 77, 0.25) !important;
            z-index: 9999 !important;
            animation: card-glow-pulse 1.5s infinite alternate !important;
        }

        @keyframes card-glow-pulse {
            from { box-shadow: 0 0 20px #72b04d, 0 0 40px rgba(114, 176, 77, 0.4); }
            to { box-shadow: 0 0 40px #72b04d, 0 0 80px rgba(114, 176, 77, 0.6), 0 0 20px #fff; }
        }

        /* Mobile specific */
        @media (max-width: 480px) {
            .search-bar {
                width: calc(100vw - 40px);
            }
            .filter-panel-drawer {
                width: calc(100vw - 40px);
            }
        }
    </style>
</head>
<body class="dark-theme">

    <div class="atlas-title">
        <h1>ATLAS TERRITORIAL</h1>
        <p>EcoGuía SOS | México</p>
    </div>

    <div class="map-overlay">
        <div style="display: flex; gap: 15px; width: 100%; align-items: center;">
            <a href="/index.html" class="map-btn" title="Volver al inicio">
                <i class="fa-solid fa-arrow-left"></i>
            </a>

            <div class="search-bar">
                <i class="fa-solid fa-magnifying-glass" style="color: rgba(255,255,255,0.4);"></i>
                <input type="text" id="map-search-input" placeholder="Buscar iniciativas ecológicas...">
            </div>

            <div class="territory-filters">
                <select id="select-estado" class="custom-select">
                    <option value="">Todo México</option>
                </select>
                <select id="select-municipio" class="custom-select" disabled>
                    <option value="">Municipio / Delegación</option>
                </select>
            </div>
        </div>
    </div>

    <!-- Controles de Acción a la Derecha -->
    <div class="map-right-controls">
        <div class="map-btn" id="locate-btn" title="Mi ubicación">
            <i class="fa-solid fa-location-crosshairs"></i>
        </div>
        <div class="map-btn" id="filter-btn" title="Filtrar">
            <i class="fa-solid fa-layer-group"></i>
        </div>
        <div class="map-btn" id="reset-filter-btn" title="Ver todos los eventos" style="display: none; background: var(--color-eco); border-color: white;">
            <i class="fa-solid fa-arrow-rotate-left"></i>
        </div>
    </div>

    <!-- PANEL DE FILTROS TERRITORIALES -->
    <div id="filter-panel" class="filter-panel">
        <div class="filter-panel-backdrop" id="filter-backdrop"></div>
        <div class="filter-panel-drawer">
            <div class="filter-section">
                <p class="filter-panel-title">🌎 Región</p>
                <div class="region-chips" id="region-chips">
                    <div class="region-chip" data-region="norte">Norte</div>
                    <div class="region-chip" data-region="bajio">Bajío</div>
                    <div class="region-chip" data-region="centro">Centro</div>
                    <div class="region-chip" data-region="sur">Sur</div>
                </div>
            </div>
            <div class="filter-section">
                <p class="filter-panel-title">📍 Estado</p>
                <select id="select-estado" class="filter-select">
                    <option value="">Todo México</option>
                </select>
            </div>
            <div class="filter-section">
                <p class="filter-panel-title">🏙️ Municipio / Delegación</p>
                <select id="select-municipio" class="filter-select" disabled>
                    <option value="">Selecciona un estado primero</option>
                </select>
            </div>
            <button class="filter-clear-btn" id="filter-clear-btn">
                <i class="fa-solid fa-rotate-left"></i> Limpiar filtros
            </button>
        </div>
    </div>

    <!-- Carrusel de Eventos Inferior con Flechas -->
    <div class="carousel-wrapper">
        <button class="carousel-arrow" id="carousel-prev">
            <i class="fa-solid fa-chevron-left"></i>
        </button>
        <div id="map-events-carousel" class="map-events-tray">
            <!-- Se llena dinámicamente -->
        </div>
        <button class="carousel-arrow" id="carousel-next">
            <i class="fa-solid fa-chevron-right"></i>
        </button>
    </div>

    <!-- PANEL LATERAL DE DETALLES (ESTILO CARTELERA) -->
    <aside id="event-detail-panel" class="map-side-panel hidden">
        <button class="panel-close-btn" id="close-side-panel"><i class="fa-solid fa-xmark"></i></button>
        <div class="panel-img-container">
            <img id="side-panel-img" src="" alt="Imagen">
        </div>
        <div class="panel-content">
            <span id="side-panel-badge" class="badge"></span>
            <h3 id="side-panel-title"></h3>
            <p class="panel-meta"><i class="fa-solid fa-layer-group"></i> <span id="side-panel-category"></span></p>
            <p class="panel-meta"><i class="fa-solid fa-location-dot"></i> <span id="side-panel-location"></span></p>
        </div>
        <div class="panel-footer">
            <a href="#" id="side-panel-link" class="btn-full">Ver todos los detalles</a>
        </div>
    </aside>

    <div id="map-container"></div>

    <!-- MapLibre GL JS -->
    <script src='https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js'></script>
    <script type="module" src="./assets/js/pages/mapa.js"></script>
</body>
</html>

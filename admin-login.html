<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Staff | EcoGuía SOS</title>
    <link rel="icon" href="./assets/gif/EGSlg.webp" type="image/gif">
    <link rel="stylesheet" href="./assets/css/global.css">
    <link rel="stylesheet" href="./assets/css/auth.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        .admin-auth-container {
            border-top: 4px solid var(--color-gaia);
        }
        .admin-badge {
            background: rgba(0, 119, 182, 0.1);
            color: var(--color-gaia);
            padding: 5px 12px;
            border-radius: 5px;
            font-size: 0.8rem;
            text-transform: uppercase;
            font-weight: 700;
            display: inline-block;
            margin-bottom: 15px;
        }
    </style>
</head>
<body class="dark-theme">
    <div class="auth-wrap">
        <a href="./index.html" class="nav-back"><i class="fa-solid fa-house"></i> Ir a Inicio</a>
        
        <div class="auth-box admin-auth-container">
            <div class="auth-header">
                <img src="./assets/gif/EGSlg.webp" alt="EcoGuía Logo" class="auth-logo">
                <div class="admin-badge">Panel Administrativo</div>
                <h2>Bienvenido</h2>
                <p>Ingresa para gestionar tu organización o el sistema.</p>
            </div>

            <form id="form-admin-login">
                <div class="input-group">
                    <label for="admin-email">Email Corporativo</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-envelope"></i>
                        <input type="email" id="admin-email" placeholder="tu@email.com" required>
                    </div>
                </div>

                <div class="input-group">
                    <label for="admin-password">Contraseña</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-lock"></i>
                        <input type="password" id="admin-password" placeholder="••••••••" required>
                    </div>
                </div>

                <div id="admin-auth-message" class="auth-message"></div>

                <button type="submit" class="auth-btn btn-gaia">
                    <i class="fa-solid fa-shield-halved"></i> Acceder al Panel
                </button>
            </form>

            <div class="auth-footer">
                <p>¿No eres administrador? <a href="./auth.html?tab=signup">Volver a Súmate</a></p>
            </div>
        </div>
    </div>

    <script type="module" src="./assets/js/admin-auth.js"></script>
</body>
</html>

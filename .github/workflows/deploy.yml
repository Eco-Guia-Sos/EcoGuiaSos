# Flujo de trabajo simple para construir y desplegar un sitio estático Vite a GitHub Pages
name: Deploy static content to Pages

on:
  # Se ejecuta cuando se hace push a la rama por defecto (main)
  push:
    branches: ['main']

  # Permite ejecutar este flujo de trabajo manualmente desde la pestaña Actions
  workflow_dispatch:

# Otorga permisos al flujo de trabajo para subir a GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Permite solo un despliegue concurrente, saltando la cola y cancelando tareas en progreso
concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  # Trabajo único de despliegue
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
      - name: Setup Pages
        uses: actions/configure-pages@v4
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Sube el directorio 'dist' donde Vite genera la versión optimizada
          path: './dist'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
